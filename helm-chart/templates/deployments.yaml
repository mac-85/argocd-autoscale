---
{{- range $i := until (int .Values.serviceCount) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fake-deployment-{{ $i }}
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fake-deployment-{{ $i }}
  template:
    metadata:
      labels:
        app: fake-deployment-{{ $i }}
    spec:
      containers:
      - name: fake
        image: nginx
---
{{- end }}
